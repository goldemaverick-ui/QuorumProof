name: Contract Upgrade with Rollback

# Issue #595: Automated contract upgrade rollback on failure.
# Triggered manually; detects upgrade failures and rolls back automatically.

on:
  workflow_dispatch:
    inputs:
      contract_id:
        description: 'Contract ID to upgrade'
        required: true
      new_wasm_path:
        description: 'Path to new WASM file (relative to repo root)'
        required: true
        default: 'target/wasm32-unknown-unknown/release/quorum_proof.wasm'
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options: [testnet, mainnet, futurenet]

permissions:
  contents: read

jobs:
  upgrade:
    name: Upgrade & Auto-Rollback
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.network }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build contracts
        run: ./scripts/build.sh

      - name: Install Stellar CLI
        run: |
          curl -sSL https://github.com/stellar/stellar-cli/releases/latest/download/stellar-cli-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin stellar

      - name: Run upgrade with rollback
        env:
          STELLAR_NETWORK: ${{ github.event.inputs.network }}
          STELLAR_RPC_URL: ${{ vars.STELLAR_RPC_URL }}
          NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}
        run: |
          ./scripts/upgrade_rollback.sh \
            "${{ github.event.inputs.contract_id }}" \
            "${{ github.event.inputs.new_wasm_path }}" \
            "${{ secrets.DEPLOYER_SECRET_KEY }}"
