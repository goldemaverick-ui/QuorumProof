name: Contract Security Scan

# Issue #594: Automated contract security scanning
# Scans for common vulnerabilities, unsafe patterns, and fails on critical issues.

on:
  push:
    branches: [main, develop]
    paths:
      - 'contracts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main, develop]
    paths:
      - 'contracts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  schedule:
    - cron: '0 3 * * *'   # Daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  vulnerability-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit (fail on vulnerabilities)
        run: cargo audit --deny warnings

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny (licenses, bans, advisories)
        run: cargo deny check

  unsafe-pattern-scan:
    name: Unsafe Pattern Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run contract-specific pattern scan
        run: ./scripts/scan_contracts.sh

  secret-scan:
    name: Secret & Credential Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [vulnerability-scan, unsafe-pattern-scan, secret-scan]
    if: always()
    steps:
      - name: Check scan results
        run: |
          if [[ "${{ needs.vulnerability-scan.result }}" == "failure" || \
                "${{ needs.unsafe-pattern-scan.result }}" == "failure" || \
                "${{ needs.secret-scan.result }}" == "failure" ]]; then
            echo "::error::One or more security scans failed. Review the job logs above."
            exit 1
          fi
          echo "All security scans passed."
